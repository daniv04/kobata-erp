services:
  postgres:
    image: postgres:17
    container_name: kobata_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kobata_erp
      POSTGRES_USER: kobata
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: kobata_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kobata.com
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "5051:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
